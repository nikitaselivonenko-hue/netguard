{% extends "layout.html" %}
{% block content %}
<h2>Alert History</h2>
<table class="table table-striped">
    <thead><tr><th>Time</th><th>Type</th><th>Source</th><th>Destination</th><th>Details</th></tr></thead>
    <tbody>
    {% for a in alerts %}
        <tr class="{{ 'table-danger' if 'Spoofing' in a.type else '' }}">
            <td>{{ a.timestamp }}</td>
            <td>{{ a.type }}</td>
            <td>{{ a.src }}</td>
            <td>{{ a.dst }}</td>
            <td>{{ a.desc }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
