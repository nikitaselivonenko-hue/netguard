{% extends "layout.html" %}
{% block content %}
<h2>Upload PCAP File for Analysis</h2>
<form method="POST" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <input type="file" class="form-control" name="file" accept=".pcap,.pcapng" required>
    </div>
    <button type="submit" class="btn btn-primary">Analyze</button>
</form>
{% endblock %}
